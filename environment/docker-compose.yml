version: '3.8'

services:
  # --- 数据库 MySQL 8.0 ---
  mysql:
    image: mysql:8.0
    container_name: speakmaster-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - speakmaster-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # --- 缓存 Redis 6.2 (单机模式，开发环境) ---
  redis:
    image: redis:6.2-alpine
    container_name: speakmaster-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - speakmaster-net
    command: redis-server --appendonly yes

  # --- 消息队列 Kafka ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    container_name: speakmaster-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - speakmaster-net

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    container_name: speakmaster-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - speakmaster-net

  # --- 搜索引擎 Elasticsearch 8.11 ---
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: speakmaster-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - speakmaster-net

  # --- 对象存储 MinIO ---
  minio:
    image: minio/minio:RELEASE.2023-05-04T21-44-30Z
    container_name: speakmaster-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - speakmaster-net

  # --- 向量数据库 Milvus ---
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: speakmaster-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379
    networks:
      - speakmaster-net

  minio-milvus:
    image: minio/minio:RELEASE.2023-05-04T21-44-30Z
    container_name: speakmaster-milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    volumes:
      - milvus_minio_data:/minio_data
    networks:
      - speakmaster-net

  milvus:
    image: milvusdb/milvus:v2.3.0
    container_name: speakmaster-milvus
    command: milvus run standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio-milvus:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio-milvus
    networks:
      - speakmaster-net

  # --- 服务注册中心 Nacos 2.2.3 ---
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: speakmaster-nacos
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - JVM_XMS=256m
      - JVM_XMX=256m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos_data:/home/nacos/data
    networks:
      - speakmaster-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Sentinel Dashboard (限流熔断控制台) ---
  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.7
    container_name: speakmaster-sentinel
    ports:
      - "8858:8858"
    environment:
      - JAVA_OPTS=-Dserver.port=8858
    networks:
      - speakmaster-net

  # --- SkyWalking OAP (链路追踪后端) ---
  skywalking-oap:
    image: apache/skywalking-oap-server:9.6.0
    container_name: speakmaster-skywalking-oap
    environment:
      - SW_STORAGE=elasticsearch
      - SW_STORAGE_ES_CLUSTER_NODES=elasticsearch:9200
      - SW_CORE_REST_HOST=0.0.0.0
      - SW_CORE_REST_PORT=12800
      - SW_CORE_GRPC_HOST=0.0.0.0
      - SW_CORE_GRPC_PORT=11800
      - JAVA_OPTS=-Xms256m -Xmx512m
    ports:
      - "11800:11800"
      - "12800:12800"
    depends_on:
      - elasticsearch
    networks:
      - speakmaster-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:12800/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- SkyWalking UI (链路追踪控制台) ---
  skywalking-ui:
    image: apache/skywalking-ui:9.6.0
    container_name: speakmaster-skywalking-ui
    environment:
      - SW_OAP_ADDRESS=http://skywalking-oap:12800
    ports:
      - "8868:8080"
    depends_on:
      - skywalking-oap
    networks:
      - speakmaster-net

networks:
  speakmaster-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  minio_data:
  etcd_data:
  milvus_minio_data:
  milvus_data:
  es_data:
  nacos_data:
