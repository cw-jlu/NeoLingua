server:
  port: 8088

spring:
  application:
    name: ai-gateway

  # Nacos + Sentinel配置
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: public
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
        port: 8720

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3307/speakmaster_ai?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000

  # MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 7
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# AI网关自定义配置
ai:
  gateway:
    # 健康检查间隔（秒）
    health-check-interval: 60
    # 缓存过期时间（秒）
    cache-ttl: 300
    # 默认超时时间（秒）
    default-timeout: 30
    # Ollama默认地址
    ollama-base-url: http://localhost:11434
  # 本地Transformers推理服务地址（ai_service）
  local:
    service:
      url: http://localhost:8089

# 日志配置
logging:
  level:
    com.speakmaster.ai: DEBUG
    org.springframework.web: INFO
