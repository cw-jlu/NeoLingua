server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  
  # Cloud配置
  cloud:
    # Nacos服务发现
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: public

    # Sentinel配置
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
        port: 8719
      # Sentinel适配Gateway
      filter:
        enabled: false
      # 开启对Gateway的支持
      scg:
        fallback:
          mode: response
          response-status: 200
          response-body: '{"code":429,"msg":"请求过于频繁，请稍后重试","data":null}'
          content-type: application/json

    # Gateway配置
    gateway:
      # 全局CORS配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600
      
      # 路由配置
      # 注意: 更具体的路径必须放在通配路径前面，否则 /user/** 会吞掉所有请求
      routes:
        # 练习服务路由
        - id: practice-service
          uri: lb://practice-service
          predicates:
            - Path=/user/practice/**,/admin/practice/**
        
        # Meeting服务路由
        - id: meeting-service
          uri: lb://meeting-service
          predicates:
            - Path=/user/friends/**,/user/meetings/**,/admin/meetings/**
        
        # 社区服务路由
        - id: community-service
          uri: lb://community-service
          predicates:
            - Path=/user/community/**,/admin/community/**
        
        # 分析服务路由 (Python服务不注册Nacos，保持直连)
        - id: analysis-service
          uri: http://localhost:8085
          predicates:
            - Path=/user/analysis/**,/admin/analysis/**
        
        # 通知服务路由
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/user/notifications/**,/admin/notifications/**
        
        # AI网关路由
        - id: ai-gateway
          uri: lb://ai-gateway
          predicates:
            - Path=/user/ai/**,/admin/ai/**
        
        # AI服务路由 (Python服务不注册Nacos，保持直连)
        - id: ai-service
          uri: http://localhost:8089
          predicates:
            - Path=/user/ai-service/**,/admin/ai-service/**
        
        # 管理服务路由
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/admin/dashboard/**,/admin/system/**,/admin/logs/**,/admin/monitor/**,/admin/admins/**,/admin/roles/**,/admin/permissions/**
        
        # 用户服务路由 (通配路由放最后，作为兜底)
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**,/admin/users/**

        # Meeting WebSocket路由
        - id: meeting-websocket
          uri: lb:ws://meeting-service
          predicates:
            - Path=/ws/meeting/**
        
        # 通知WebSocket路由
        - id: notification-websocket
          uri: lb:ws://notification-service
          predicates:
            - Path=/ws/notification/**

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    root: INFO
    com.speakmaster: DEBUG
    org.springframework.cloud.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
