server:
  port: 8083

spring:
  application:
    name: meeting-service

  # Nacos + Sentinel配置
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: public
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
        port: 8723

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3307/speakmaster_meeting?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000

  # MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 3
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 1800000  # 30分钟
      cache-null-values: false

  # Kafka配置
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 1
      retries: 3

# Elasticsearch配置
elasticsearch:
  host: localhost
  port: 9200

# Feign配置
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
      ai-service:
        url: http://localhost:8089

# AI Gateway 地址
ai:
  gateway:
    url: http://localhost:8088

# Netty WebSocket 配置
netty:
  websocket:
    port: 8090
    boss-threads: 1
    worker-threads: 0  # 0表示使用默认值（CPU核心数*2）
    max-frame-size: 65536  # 64KB
    read-timeout: 60  # 读超时60秒

# 日志配置
logging:
  level:
    com.speakmaster.meeting: DEBUG
    org.springframework.web: INFO
    io.netty: INFO
