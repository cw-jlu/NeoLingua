server:
  port: 8087

spring:
  application:
    name: admin-service

  # Nacos + Sentinel配置
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: public
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
        port: 8726

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3307/speakmaster_admin?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.speakmaster.admin.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 6
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# 日志配置 - 启用 DEBUG 模式
logging:
  level:
    root: INFO
    com.speakmaster.admin: DEBUG
    org.springframework: DEBUG
    org.springframework.boot: DEBUG
    org.springframework.beans: DEBUG
    org.springframework.context: DEBUG
    org.springframework.data.redis: DEBUG
    org.springframework.boot.autoconfigure: DEBUG

# 启用 Spring Boot debug 模式
debug: true